<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0f1e"/>
<link rel="manifest" href="manifest.json"/> 
<title>АНЕА</title>
<style>
html, body {
  background: #0a0f1e !important;
  background-color: #0a0f1e !important;
  height: 100%;
  margin: 0;
  padding: 0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0;min-height:100dvh;overflow-x:hidden}

.hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:#070c18;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;gap:8px;padding:11px 14px}
.home-btn{background:#1e3a5f;border:none;color:#4d9ef8;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.home-btn:active{background:#2d5a8e}
.back-btn{background:#1a2d4a;border:none;color:#8ba5c4;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;display:none}
.hdr-center{flex:1;min-width:0;text-align:center}
.hdr-title{font-size:15px;font-weight:800;letter-spacing:1px;color:#e2e8f0}
.hdr-sub{font-size:12px;color:#8ba5c4;margin-top:3px;letter-spacing:.5px;font-weight:600}
.hdr-badge{background:#1e3a5f;color:#4d9ef8;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}

.body{padding:65px 14px calc(20px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto}

/* HOME */
.sec-title{font-size:11px;font-weight:700;color:#4d9ef8;text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 10px}
.bb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:6px}
.bb-btn{background:#111827;border:1px solid #1e3a5f;border-radius:10px;padding:12px 4px;text-align:center;cursor:pointer;transition:all .15s}
.bb-btn:active{background:#1e3a5f;transform:scale(.97)}
.bb-num{font-size:20px;font-weight:800;color:#e2e8f0}
.bb-lbl{font-size:8px;color:#4d6a85;margin-top:1px;text-transform:uppercase;letter-spacing:.5px}

.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.mode-btn{padding:16px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;line-height:1.4}
.mode-btn.shove{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 15px #7c3aed30}
.mode-btn.call{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;box-shadow:0 4px 15px #0d948830}
.mode-btn:active{transform:scale(.97)}
.mode-sub{font-size:9px;opacity:.8;display:block;margin-top:2px}

/* BB BAR */
.bb-bar{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:20px 0 12px}
.bb-pill{background:#111827;border:1px solid #1e3a5f;border-radius:10px;padding:12px 2px;font-size:13px;font-weight:700;color:#8ba5c4;cursor:pointer;text-align:center;transition:all .15s}
.bb-pill:active{background:#1e3a5f;transform:scale(.95)}
.bb-pill.active{background:#1e3a5f;color:#4d9ef8;border-color:#4d9ef8;box-shadow:0 0 8px #4d9ef830}

/* CHARTS — single column, big readable charts */
.charts-wrap{display:flex;flex-direction:column;gap:20px;width:100%}
.chart-block{background:#0d1525;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden;width:100%;display:block}
.chart-block.clickable{border-color:#4d9ef880;cursor:pointer;transition:all .2s;box-shadow:0 0 12px #4d9ef820}
.chart-block.clickable:active{border-color:#4d9ef8;background:#111827;transform:scale(.99)}
.chart-img{width:100%;display:block;border-radius:0;background:#fff}
.chart-label{font-size:14px;font-weight:800;color:#4d9ef8;text-transform:uppercase;letter-spacing:2px;padding:11px 12px 12px;background:#0a1628;border-top:1px solid #1e3a5f;text-align:center;line-height:1.2}
.chart-label .tap-hint{font-size:9px;color:#4d6a85;font-weight:400;letter-spacing:0;display:block;margin-top:3px;text-transform:none}

/* POSITION NAV */
.pos-scroll{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.pos-scroll::-webkit-scrollbar{display:none}
.pos-chip{background:#111827;border:1px solid #1e3a5f;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:#8ba5c4;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pos-chip.active{background:#1e3a5f;color:#4d9ef8;border-color:#4d9ef8}

/* POS SELECTOR */
.pos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.pos-btn{background:#111827;border:2px solid #1e3a5f;border-radius:10px;padding:14px 4px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:800}
.pos-btn:active{transform:scale(.97)}

.empty{text-align:center;padding:50px 20px;color:#4d6a85;font-size:12px}
.info-box{background:#0d1525;border:1px solid #1e3a5f;border-radius:12px;padding:14px;margin-top:12px}
.info-title{font-size:10px;color:#4d9ef8;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.info-text{font-size:11px;color:#8ba5c4;line-height:1.7}
</style>
</head>

<div class="hdr">
  <button class
